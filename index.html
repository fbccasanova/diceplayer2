<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flourish 2-Player Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --dice-size: 100px;
            --pip-size: 18px;
            --flourish-green: #C1FF72;
            --flourish-pink: #FF66C4;
        }

        body {
            background: #05472A;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            min-height: 100vh;
            margin: 0;
            padding-top: 20px;
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        .logo-image { max-width: 350px; width: 80%; height: auto; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); margin-bottom: 10px; }

        /* Player Toggle Styling */
        .player-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
            padding: 4px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .toggle-btn {
            padding: 8px 24px;
            border-radius: 99px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: var(--flourish-green);
            color: #05472A;
            box-shadow: 0 2px 10px rgba(193, 255, 114, 0.3);
        }

        /* Controls Area */
        #main-control-area { display: flex; flex-direction: column; align-items: center; }
        .scene { width: var(--dice-size); height: var(--dice-size); perspective: 600px; margin: 20px; cursor: pointer; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 1.8s cubic-bezier(0.2, 0.8, 0.3, 1); }
        .cube__face { position: absolute; width: var(--dice-size); height: var(--dice-size); background: white; border: 2px solid #e2e8f0; border-radius: 16px; display: grid; grid-template-areas: "a . b" "c d e" "f . g"; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); padding: 12px; box-sizing: border-box; backface-visibility: hidden; }
        .pip { display: block; width: var(--pip-size); height: var(--pip-size); border-radius: 50%; background-color: #1e293b; box-shadow: inset 0 3px 3px rgba(0,0,0,0.4); justify-self: center; align-self: center; }

        .face-1 { transform: rotateY(0deg) translateZ(50px); }
        .face-2 { transform: rotateY(90deg) translateZ(50px); }
        .face-3 { transform: rotateY(180deg) translateZ(50px); }
        .face-4 { transform: rotateY(-90deg) translateZ(50px); }
        .face-5 { transform: rotateX(90deg) translateZ(50px); }
        .face-6 { transform: rotateX(-90deg) translateZ(50px); }

        /* Pip Logic */
        .face-1 .pip { grid-area: d; }
        .face-2 .pip:nth-child(1) { grid-area: a; } .face-2 .pip:nth-child(2) { grid-area: g; }
        .face-3 .pip:nth-child(1) { grid-area: a; } .face-3 .pip:nth-child(2) { grid-area: d; } .face-3 .pip:nth-child(3) { grid-area: g; }
        .face-4 .pip:nth-child(1) { grid-area: a; } .face-4 .pip:nth-child(2) { grid-area: b; } .face-4 .pip:nth-child(3) { grid-area: f; } .face-4 .pip:nth-child(4) { grid-area: g; }
        .face-5 .pip:nth-child(1) { grid-area: a; } .face-5 .pip:nth-child(2) { grid-area: b; } .face-5 .pip:nth-child(3) { grid-area: d; } .face-5 .pip:nth-child(4) { grid-area: f; } .face-5 .pip:nth-child(5) { grid-area: g; }
        .face-6 .pip:nth-child(1) { grid-area: a; } .face-6 .pip:nth-child(2) { grid-area: b; } .face-6 .pip:nth-child(3) { grid-area: c; } .face-6 .pip:nth-child(4) { grid-area: e; } .face-6 .pip:nth-child(5) { grid-area: f; } .face-6 .pip:nth-child(6) { grid-area: g; }

        .pos-display { background: rgba(255, 255, 255, 0.15); padding: 8px 16px; border-radius: 15px; display: flex; align-items: center; gap: 12px; margin-top: 5px; }
        .adjust-btn { background: rgba(255, 255, 255, 0.2); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .reset-btn { margin-top: 15px; padding: 8px 20px; background-color: var(--flourish-pink); color: white; border-radius: 99px; font-weight: bold; text-transform: uppercase; border: none; box-shadow: 0 4px 0 #b33a80; font-size: 0.8rem; }
    </style>
</head>
<body>

    <img src="https://raw.githubusercontent.com/calebkatz874-bot/images/main/FLOURISH.png" alt="Flourish" class="logo-image">

    <div class="player-toggle">
        <div id="btn-p1" class="toggle-btn active" onclick="switchPlayer(1)">Player 1</div>
        <div id="btn-p2" class="toggle-btn" onclick="switchPlayer(2)">Player 2</div>
    </div>

    <div id="main-control-area">
        <div class="scene" id="dice-scene">
            <div id="dice" class="cube">
                <div class="cube__face face-1"><span class="pip"></span></div>
                <div class="cube__face face-2"><span class="pip"></span><span class="pip"></span></div>
                <div class="cube__face face-3"><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
                <div class="cube__face face-4"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
                <div class="cube__face face-5"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
                <div class="cube__face face-6"><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span><span class="pip"></span></div>
            </div>
        </div>

        <div id="message-box" class="text-xl font-bold">Player 1's Turn</div>
        
        <div class="pos-display">
            <div class="adjust-btn" onclick="manualAdjust(-1)">−</div>
            <div id="position-text" class="text-lg font-bold">Spot: 0</div>
            <div class="adjust-btn" onclick="manualAdjust(1)">+</div>
        </div>

        <button class="reset-btn" onclick="resetGame()">Reset Player</button>
    </div>

    <script>
        let currentPlayer = 1;
        let positions = {
            1: parseInt(localStorage.getItem('flourish_p1_pos')) || 0,
            2: parseInt(localStorage.getItem('flourish_p2_pos')) || 0
        };

        const dice = document.getElementById('dice');
        const msgBox = document.getElementById('message-box');
        const posText = document.getElementById('position-text');
        const MAX_SPOTS = 20;

        function updateUI() {
            posText.textContent = `Spot: ${positions[currentPlayer]}`;
            msgBox.textContent = `Player ${currentPlayer}'s Turn`;
            
            // Highlight active button
            document.getElementById('btn-p1').classList.toggle('active', currentPlayer === 1);
            document.getElementById('btn-p2').classList.toggle('active', currentPlayer === 2);
            
            // Tell Hoverlay to switch the highlight/focus
            sendHoverlay(`active-player-${currentPlayer}`);
            // Also send the current spot to ensure Hoverlay is synced
            sendHoverlay(`spot-${positions[currentPlayer]}`);
        }

        function switchPlayer(p) {
            if (isRolling) return;
            currentPlayer = p;
            updateUI();
        }

        function sendHoverlay(msg) {
            window.location.href = `space://do?action=send_event&event_message=${msg}`;
        }

        function manualAdjust(amt) {
            positions[currentPlayer] = Math.max(0, Math.min(MAX_SPOTS, positions[currentPlayer] + amt));
            localStorage.setItem(`flourish_p${currentPlayer}_pos`, positions[currentPlayer]);
            updateUI();
        }

        const faceRotations = { 1:{x:0, y:0}, 2:{x:0, y:-90}, 3:{x:0, y:-180}, 4:{x:0, y:90}, 5:{x:-90, y:0}, 6:{x:90, y:0} };
        let currentX = 0, currentY = 0, isRolling = false;

        function rollDice() {
            if (isRolling) return;
            isRolling = true;
            const result = Math.floor(Math.random() * 6) + 1;
            
            positions[currentPlayer] = Math.min(MAX_SPOTS, positions[currentPlayer] + result);
            localStorage.setItem(`flourish_p${currentPlayer}_pos`, positions[currentPlayer]);

            const spinsX = (Math.floor(Math.random() * 4) + 5) * 360;
            const spinsY = (Math.floor(Math.random() * 4) + 5) * 360;
            currentX += spinsX + faceRotations[result].x - (currentX % 360);
            currentY += spinsY + faceRotations[result].y - (currentY % 360);
            dice.style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg)`;

            setTimeout(() => {
                msgBox.textContent = `P${currentPlayer} rolled a ${result}!`;
                posText.textContent = `Spot: ${positions[currentPlayer]}`;
                isRolling = false;
                sendHoverlay(`dice-${result}`);
                setTimeout(() => sendHoverlay(`spot-${positions[currentPlayer]}`), 600);
            }, 1800);
        }

        function resetGame() {
            if (confirm(`Reset Player ${currentPlayer} to Start?`)) {
                positions[currentPlayer] = 0;
                localStorage.setItem(`flourish_p${currentPlayer}_pos`, 0);
                updateUI();
                sendHoverlay('game-reset');
            }
        }

        document.getElementById('dice-scene').addEventListener('click', rollDice);
        
        // Initial sync
        updateUI();
    </script>
</body>
</html>
